<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | elect-rix.tech</title>
    <meta name="description" content="Page not found. Protect your data. Even when the lights go out." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary: #0a0a0f;
        --surface: #12121a;
        --surface-light: #1a1a28;
        --accent: #6366f1;
        --accent-bright: #818cf8;
        --text: #e4e4ea;
        --text-muted: #8b8b9a;
        --border: #252533;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', sans-serif;
        background: var(--primary);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: 6rem;
        font-weight: 800;
        color: var(--accent-bright);
        line-height: 1;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1.25rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
        max-width: 28rem;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        background: var(--accent);
        color: white;
        font-weight: 600;
        border-radius: 0.5rem;
        text-decoration: none;
        transition: background 0.2s;
      }
      a:hover { background: var(--accent-bright); }
    </style>
  </head>
  <body>
    <h1>404</h1>
    <p>This page doesn't exist. The system works — this route just isn't part of it.</p>
    <a href="/">← Back to elect-rix.tech</a>
  </body>
</html>
